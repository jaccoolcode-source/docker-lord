services:
  docker-lord:
    build: .
    container_name: docker-lord
    restart: unless-stopped
    environment:
      - DOCKER_TCP_HOST=host.docker.internal
      - DOCKER_TCP_PORT=2375
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docker-lord.rule=Host(`docker-lord.localhost`)"
      - "traefik.http.routers.docker-lord.entrypoints=web"
      - "traefik.http.services.docker-lord.loadbalancer.server.port=3000"

  db:
    image: postgres:16-alpine
    container_name: docker-lord-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

networks:
  traefik:
    external: true
  internal:
    driver: bridge
